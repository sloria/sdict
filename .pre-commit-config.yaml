repos:
- repo: local
  hooks:
    - id: cargo-fmt
      name: cargo fmt
      language: system
      entry: cargo fmt --
      types: [rust]
      pass_filenames: true

    - id: cargo-clippy
      name: cargo clippy
      language: system
      entry: cargo clippy -- -D warnings
      types: [rust]
      pass_filenames: false
