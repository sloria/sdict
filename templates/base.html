<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}sdict{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any" />
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <style>
      :root {
        --text: #1a1a1a;
        --text-secondary: #555;
        --text-faint: #767676;
        --bg: #fafaf8;
        --bg-input: #fff;
        --accent: #2c5282;
        --accent-hover: #1a365d;
        --accent-light: #ebf4ff;
        --border: #ccc;
        --border-light: #eee;
        --btn: #2c5282;
        --btn-hover: #1a365d;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e2e2e2;
          --text-secondary: #999;
          --text-faint: #8a8a8a;
          --bg: #1a1a1a;
          --bg-input: #2a2a2a;
          --accent: #7db4f0;
          --accent-hover: #a0ccf5;
          --accent-light: #2a3a4a;
          --border: #444;
          --border-light: #333;
          --btn: #3b6ba5;
          --btn-hover: #5a9bd5;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Charter, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
        font-size: 18px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        padding: 2rem 1rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .container {
        max-width: 620px;
        margin: 0 auto;
        flex: 1;
        width: 100%;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* Search form */
      .search-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }
      .search-form input[type="text"] {
        flex: 1;
        font-family: inherit;
        font-size: 1rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg-input);
        color: var(--text);
      }
      .search-form input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-light);
      }
      .search-form button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--accent-light);
      }
      .search-form button {
        font-family: inherit;
        font-size: 1rem;
        padding: 0.5rem 1rem;
        background: var(--btn);
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .search-form button:hover {
        background: var(--btn-hover);
      }
      .search-form--small input[type="text"] {
        font-size: 0.9rem;
        padding: 0.4rem 0.65rem;
      }
      .search-form--small button {
        font-size: 0.9rem;
        padding: 0.4rem 0.85rem;
      }

      /* Home page */
      .home {
        text-align: center;
        padding-top: min(20vh, 150px);
      }
      .home h1 {
        font-size: 2.5rem;
        margin-bottom: 0.25rem;
        font-weight: 400;
        letter-spacing: 0.05em;
      }
      .home .tagline {
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }
      .home .search-form {
        justify-content: center;
        max-width: 480px;
        margin: 0 auto;
      }

      /* Results page */
      .results-header {
        margin-bottom: 0.25rem;
      }
      .results-header h1 {
        font-size: 1.8rem;
        font-weight: 400;
        margin-bottom: 0;
      }
      .quick-def {
        color: var(--text-secondary);
        font-size: 1.25rem;
        margin-bottom: 2rem;
      }

      /* Definition hierarchy */
      .subheadword {
        font-size: 1.4rem;
        font-weight: 400;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
      }
      .pos-group {
        margin-bottom: 1.5rem;
      }
      .pos-label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 0.5rem;
      }
      .sense {
        margin-bottom: 1rem;
      }
      .sense-header {
        margin-bottom: 0.25rem;
      }
      .sense-number {
        font-weight: 600;
      }
      .sense-context {
        color: var(--text-secondary);
      }
      .region-label,
      .register-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        font-style: italic;
      }
      .translation {
        margin-left: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .translation-letter {
        color: var(--text-secondary);
        font-weight: 400;
      }
      .example {
        margin-left: 1.25rem;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }
      .example .es {
        font-style: italic;
      }
      .example .en {
        color: var(--text-secondary);
      }

      /* Corpus examples */
      .examples-section {
        margin-top: 2.5rem;
        border-top: 1px solid var(--border-light);
        padding-top: 1.5rem;
      }
      .examples-section h2 {
        font-size: 1.3rem;
        font-weight: 400;
        margin-bottom: 1rem;
      }
      .corpus-example {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.95rem;
      }
      .corpus-example .en {
        color: var(--text-secondary);
      }
      .corpus-example em {
        font-style: normal;
        font-weight: 600;
      }
      @media (max-width: 500px) {
        .corpus-example {
          grid-template-columns: 1fr;
          gap: 0.25rem;
        }
      }

      /* Filter tags */
      .filter-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }
      .filter-tag {
        display: inline-block;
        padding: 0.25rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
      }
      .filter-tag:hover {
        background: var(--accent-light);
        text-decoration: none;
      }
      .filter-tag.active {
        background: var(--btn);
        color: #fff;
        border-color: var(--btn);
      }

      /* Site name link */
      .site-name {
        display: block;
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: var(--text-faint);
        margin-bottom: 0.5rem;
      }
      .site-name:hover {
        color: var(--text);
        text-decoration: none;
      }

      /* Error/not-found page */
      .error-message {
        color: var(--text-secondary);
        padding: 1rem 0;
        margin-bottom: 1.5rem;
      }

      /* Footer */
      .footer {
        margin-top: 3rem;
        padding: 1rem;
        text-align: center;
        font-size: 0.8rem;
        color: var(--text-faint);
      }
    </style>
  </head>
  <body>
    <div class="container">{% block content %}{% endblock %}</div>
    <footer class="footer">
      Powered by <a href="https://www.spanishdict.com">SpanishDict</a>
    </footer>
  </body>
</html>
