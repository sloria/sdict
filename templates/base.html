<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}sdict{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any" />
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <style>
      /* https://cube.fyi */

      :root {
        --text: #1a1a1a;
        --text-secondary: #555;
        --text-faint: #767676;
        --bg: #fafaf8;
        --bg-input: #fff;
        --accent: #2c5282;
        --accent-light: #ebf4ff;
        --border: #ccc;
        --border-light: #eee;
        --green: #276d3d;
        --accent-solid: #2c5282;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e2e2e2;
          --text-secondary: #999;
          --text-faint: #8a8a8a;
          --bg: #1a1a1a;
          --bg-input: #2a2a2a;
          --accent: #7db4f0;
          --accent-light: #2a3a4a;
          --border: #444;
          --border-light: #333;
          --green: #6ec98b;
          --accent-solid: #3b6ba5;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          Charter, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia,
          serif;
        font-size: 18px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        padding: 2rem 1rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      footer {
        margin-top: 3rem;
        padding: 1rem;
        text-align: center;
        font-size: 0.8rem;
        color: var(--text-faint);
      }

      /* === Compositions === */

      .wrapper {
        max-width: 620px;
        margin: 0 auto;
        flex: 1;
        width: 100%;
      }
      .cluster {
        display: flex;
        flex-wrap: wrap;
        gap: var(--cluster-gap, 0.5rem);
        align-items: center;
      }

      /* === Utilities === */

      .text-center {
        text-align: center;
      }
      .color-secondary {
        color: var(--text-secondary);
      }
      .color-faint {
        color: var(--text-faint);
      }
      .color-green {
        color: var(--green);
      }
      .text-s {
        font-size: 0.95rem;
      }
      .text-xs {
        font-size: 0.85rem;
      }
      .italic {
        font-style: italic;
      }
      .font-semibold {
        font-weight: 600;
      }
      .font-normal {
        font-weight: 400;
      }
      .uppercase-label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .indent {
        margin-left: 1.25rem;
      }

      /* === Blocks === */

      .search-form {
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg-input);
      }
      .search-form:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-light);
      }
      .search-form input[type="text"] {
        flex: 1;
        font-family: inherit;
        font-size: 1rem;
        padding: 0.5rem 0.75rem;
        border: none;
        background: none;
        color: var(--text);
        outline: none;
      }
      .search-form button {
        background: none;
        border: none;
        color: var(--text-faint);
        padding: 0.5rem;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .search-form button:hover {
        color: var(--text);
      }
      .search-form button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--accent-light);
      }

      .hero {
        padding-top: min(20vh, 150px);
      }
      .hero h1 {
        font-size: 2.5rem;
        margin-bottom: 0.25rem;
        font-weight: 400;
        letter-spacing: 0.05em;
      }
      .hero .tagline {
        margin-bottom: 1.5rem;
      }
      .hero .search-form {
        justify-content: center;
        max-width: 480px;
        margin: 0 auto;
      }

      .results-header h1 {
        font-size: 1.8rem;
        font-weight: 400;
      }

      .quick-def {
        font-size: 1.25rem;
        margin-bottom: 1rem;
      }

      .subheadword {
        font-size: 1.4rem;
        font-weight: 400;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
      }

      .pos-group {
        margin-bottom: 1.5rem;
      }

      .sense {
        margin-bottom: 1rem;
      }
      .sense-header {
        margin-bottom: 0.25rem;
      }
      .translation {
        display: flex;
        gap: 0.25ch;
        margin-bottom: 0.25rem;
      }
      .example {
        margin-bottom: 0.5rem;
      }

      .examples-section {
        margin-top: 2.5rem;
        border-top: 1px solid var(--border-light);
        padding-top: 1.5rem;
      }
      .examples-section h2 {
        font-size: 1.3rem;
        font-weight: 400;
        margin-bottom: 1rem;
      }

      .corpus-example {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-light);
      }
      .corpus-example em {
        font-style: normal;
        font-weight: 600;
      }
      @media (max-width: 500px) {
        .corpus-example {
          grid-template-columns: 1fr;
          gap: 0.25rem;
        }
      }

      .filter-tags {
        --cluster-gap: 0.4rem;
        margin-bottom: 1rem;
      }

      .filter-tag {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        font-size: 0.85rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--accent);
        text-decoration: none;
      }
      .filter-tag:hover {
        background: var(--accent-light);
        text-decoration: none;
      }

      .site-name {
        display: block;
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: var(--text);
        margin-bottom: 0.5rem;
      }
      .site-name:hover {
        color: var(--text-faint);
        text-decoration: none;
      }

      .error-message {
        padding: 1rem 0;
        margin-bottom: 1.5rem;
      }

      /* === Exceptions === */

      .filter-tag[data-state="active"] {
        background: var(--accent-solid);
        color: #fff;
        border-color: var(--accent-solid);
      }
    </style>
  </head>
  <body>
    <div class="wrapper">{% block content %}{% endblock %}</div>
    <footer>
      Powered by <a href="https://www.spanishdict.com">SpanishDict</a>
    </footer>
  </body>
</html>
