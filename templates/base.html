<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}sdict{% endblock %}</title>
    <style>
      :root {
        --text: #1a1a1a;
        --text-secondary: #555;
        --text-muted: #666;
        --text-faint: #888;
        --text-es: #333;
        --bg: #fafaf8;
        --bg-input: #fff;
        --accent: #2c5282;
        --accent-hover: #1a365d;
        --accent-light: #ebf4ff;
        --border: #ccc;
        --border-light: #eee;
        --border-medium: #ddd;
        --border-tag: #cbd5e0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e2e2e2;
          --text-secondary: #999;
          --text-muted: #999;
          --text-faint: #666;
          --text-es: #ccc;
          --bg: #1a1a1a;
          --bg-input: #2a2a2a;
          --accent: #7db4f0;
          --accent-hover: #2c5282;
          --accent-light: #2a3a4a;
          --border: #444;
          --border-light: #333;
          --border-medium: #333;
          --border-tag: #444;
          --btn: #3b6ba5;
          --btn-hover: #2c5282;
          --tag-active: #3b6ba5;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Charter, serif;
        font-size: 18px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        padding: 2rem 1rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .container {
        max-width: 620px;
        margin: 0 auto;
        flex: 1;
        width: 100%;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* Search form */
      .search-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }
      .search-form input[type="text"] {
        flex: 1;
        font-family: inherit;
        font-size: 1rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg-input);
        color: var(--text);
      }
      .search-form input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      .search-form button {
        font-family: inherit;
        font-size: 1rem;
        padding: 0.5rem 1rem;
        background: var(--btn, var(--accent));
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .search-form button:hover {
        background: var(--btn-hover, var(--accent-hover));
      }

      /* Home page */
      .home {
        text-align: center;
        padding-top: 20vh;
      }
      .home h1 {
        font-size: 2.5rem;
        margin-bottom: 0.25rem;
        font-weight: 400;
        letter-spacing: 0.05em;
      }
      .home .tagline {
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }
      .home .search-form {
        justify-content: center;
        max-width: 400px;
        margin: 0 auto;
      }

      /* Results page */
      .results-header {
        margin-bottom: 1.5rem;
      }
      .results-header h1 {
        font-size: 1.8rem;
        font-weight: 400;
        margin-bottom: 0.25rem;
      }
      .quick-def {
        color: var(--text-secondary);
        font-size: 1.05rem;
        margin-bottom: 1.5rem;
      }

      /* Entries */
      .entry {
        margin-bottom: 1.5rem;
      }
      .definition {
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .example {
        margin-left: 1.25rem;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }
      .example .es {
        font-style: italic;
        color: var(--text-es);
      }
      .example .en {
        color: var(--text-secondary);
      }

      /* Corpus examples */
      .examples-section {
        margin-top: 2.5rem;
        border-top: 1px solid var(--border-medium);
        padding-top: 1.5rem;
      }
      .examples-section h2 {
        font-size: 1.3rem;
        font-weight: 400;
        margin-bottom: 1rem;
      }
      .corpus-example {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.95rem;
      }
      .corpus-example .es {
        color: var(--text-es);
      }
      .corpus-example .en {
        color: var(--text-secondary);
      }
      .corpus-example em {
        font-style: normal;
        font-weight: 600;
      }
      @media (max-width: 500px) {
        .corpus-example {
          grid-template-columns: 1fr;
          gap: 0.25rem;
        }
      }

      /* Filter tags */
      .filter-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }
      .filter-tag {
        display: inline-block;
        padding: 0.25rem 0.7rem;
        border: 1px solid var(--border-tag);
        border-radius: 999px;
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
      }
      .filter-tag:hover {
        background: var(--accent-light);
        text-decoration: none;
      }
      .filter-tag.active {
        background: var(--tag-active, var(--accent));
        color: #fff;
        border-color: var(--tag-active, var(--accent));
      }

      /* Site name link */
      .site-name {
        display: block;
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: var(--text-faint);
        margin-bottom: 0.5rem;
      }
      .site-name:hover {
        color: var(--text);
        text-decoration: none;
      }

      /* Error/not-found page */
      .error-message {
        color: var(--text-secondary);
        padding: 1rem 0;
        margin-bottom: 1.5rem;
      }

      /* Footer */
      .footer {
        margin-top: 3rem;
        padding: 1rem;
        text-align: center;
        font-size: 0.8rem;
        color: var(--text-faint);
      }
    </style>
  </head>
  <body>
    <div class="container">{% block content %}{% endblock %}</div>
    <footer class="footer">
      Powered by <a href="https://www.spanishdict.com">SpanishDict</a>
    </footer>
  </body>
</html>
