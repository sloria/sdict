<form class="search-form cluster" action="/search" method="post">
  <input
    type="text"
    name="term"
    {% if !search.value.is_empty() %}value="{{ search.value }}"{% endif %}
    placeholder="Spanish or English…"
    aria-label="Search for a Spanish or English word"
    {% if search.autofocus %}autofocus{% endif %}
  />
  <button type="submit" aria-label="Search">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
  </button>
</form>
